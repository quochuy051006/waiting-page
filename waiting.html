<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Ticket Studio | Waiting Room</title>
    <style>
        :root {
            --brand-green: #7FFF00; /* KKTIX green */
            --accent-color: var(--brand-green);
            --bg-dark: #121212; /* deep charcoal background */
            --glass-bg: rgba(26, 26, 26, 0.95); /* main card glass */
            --glass-border: rgba(127,255,0,0.3);
            --neon-glow: rgba(127,255,0,0.4);
        }

        body {
            /* Dark mode base with strong green top split */
            background:
                radial-gradient(circle at 10% 10%, rgba(127,255,0,0.1) 0%, transparent 18%),
                radial-gradient(circle at 90% 10%, rgba(127,255,0,0.1) 0%, transparent 18%),
                linear-gradient(to bottom, rgba(127,255,0,0.4) 0%, rgba(127,255,0,0.24) 18%, rgba(127,255,0,0.12) 28%, rgba(15,15,15,0.92) 35%, var(--bg-dark) 100%);
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Queue Information Section */
        .status-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .queue-number {
            font-size: 4rem;
            font-weight: 800;
            color: var(--accent-color);
            text-shadow: 0 0 20px var(--neon-glow);
        }

        /* Mini horizontal progress tracker */
        .progress-tracker {
            width: 520px;
            max-width: calc(100% - 40px);
            height: 36px;
            margin: 12px auto 0;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: #cfeef1;
        }
        .progress-label { width:60px; text-align:center; opacity:0.9; display:flex; align-items:center; gap:6px; justify-content:center; }
        .label-icon { font-size:18px; line-height:1; }
        .progress-bar-wrap {
            position: relative;
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 8px;
            overflow: hidden;
        }
        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(127,255,0,0.95), rgba(127,255,0,0.95));
            box-shadow: 0 6px 24px rgba(127,255,0,0.08);
            transition: all 1s ease-in-out;
        }
        .progress-icon {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            left: 0%;
            transition: all 1s ease-in-out;
            font-size: 18px;
            z-index: 3;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            box-shadow: 0 0 15px var(--neon-glow);
        }
        .progress-percent {
            width:120px;
            text-align:left;
            opacity:0.95;
            font-weight:700;
            color: var(--accent-color);
            text-shadow: 0 0 8px rgba(127,255,0,0.12);
        }
        .stage-label span:first-child {
            color: var(--accent-color);
            text-shadow: 0 0 12px var(--neon-glow);
            font-weight:700;
        }

        /* The Ticket Canvas (Neon Glassmorphism) */
        .ticket-container {
            position: relative;
            width: 500px;
            height: 260px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(8px) saturate(120%);
        }

        /* Perforation edges (ticket stub) */
        .perforation {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 44px;
            pointer-events: none;
            z-index: 0;
            display: block;
            opacity: 0.18;
        }
        .perforation-left { left: 6px; }
        .perforation-right { right: 6px; }
        .perforation-left::before,
        .perforation-right::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(to bottom, transparent 0 10px, rgba(127,255,0,0.8) 10px 12px, transparent 12px 24px);
            filter: blur(0.2px) drop-shadow(0 0 10px rgba(127,255,0,0.35));
        }
        .perforation-left::after,
        .perforation-right::after {
            content: '';
            position: absolute;
            inset: 0 12px;
            background: linear-gradient(to bottom, transparent 0%, rgba(127,255,0,0.24) 18%, rgba(127,255,0,0.06) 50%, rgba(127,255,0,0.24) 82%, transparent 100%);
            box-shadow: 0 0 28px rgba(127,255,0,0.18);
        }

        /* Soundwave / abstract corner SVG decorations */
        .soundwave {
            position: fixed;
            width: 320px;
            height: 320px;
            opacity: 0.18; /* clearly visible but not overwhelming */
            z-index: 0;
            fill: var(--brand-green);
            filter: drop-shadow(0 0 14px rgba(127,255,0,0.25));
        }
        .soundwave.top-left { left: 0; top: 0; transform: translate(-16%, -16%); }
        .soundwave.bottom-right { right: 0; bottom: 0; transform: translate(16%, 16%) rotate(180deg); }

        /* Spotlight effects for the side dead space */
        .spotlight {
            position: fixed;
            width: 320px;
            height: 320px;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle, rgba(127,255,0,0.1) 0%, rgba(127,255,0,0.05) 30%, transparent 70%);
            filter: blur(6px);
        }
        .spotlight.top-left { left: -70px; top: -60px; }
        .spotlight.top-right { right: -70px; top: -60px; }

        /* Main centered glass card that holds the content */
        .main-card {
            position: relative;
            z-index: 2;
            width: 940px;
            max-width: calc(100% - 40px);
            margin: 0 auto;
            margin-top: 6vh;
            background: var(--glass-bg); /* rgba(26,26,26,0.95) per spec */
            border: 2px solid var(--brand-green);
            border-radius: 16px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            backdrop-filter: blur(12px) saturate(120%);
            box-shadow:
                0 10px 30px rgba(0,0,0,0.5),
                0 0 15px rgba(127,255,0,0.1),
                inset 0 0 40px rgba(127,255,0,0.2);
            color: #ffffff; /* ensure contrast inside card */
        }

        /* Ensure progress and ticket studio are visually elevated inside the card */
        .main-card .status-header, .main-card .ticket-container, .main-card .editor-panel {
            z-index: 3;
            position: relative;
        }

        /* Template styles */
        .ticket-container.template-1 { border-radius: 20px; }
        .ticket-container.template-2 { border-radius: 6px; box-shadow: 0 35px 60px -20px rgba(0,0,0,0.6); }
        .ticket-container.template-3 { border-radius: 40px; border: 2px dashed rgba(255,255,255,0.08); }

        /* (frame overlay removed) */

        /* Layer 1: The User Image */
        #idol-preview {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            z-index: 1;
            transition: transform 0.1s ease-out;
            filter: brightness(0.9) contrast(1.1);
        }

        /* Layer 2: Glassmorphism Overlay */
        .ticket-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            background: linear-gradient(
                135deg, 
                rgba(0, 0, 0, 0.582) 0%, 
                transparent 60%, 
                rgba(255, 255, 255, 0.733) 100%
            );
            pointer-events: none;
            padding: 30px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }

        .event-title {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 900;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 6px rgba(127,255,0,0.08);
        }

        .user-tag {
            background: var(--accent-color);
            color: #000;
            display: inline-block;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 10px;
        }

        /* Controls Section (Neon Glassmorphism) */
        .editor-panel {
            margin-top: 30px;
            background: var(--glass-bg);
            padding: 25px;
            border-radius: 15px;
            width: 450px;
            backdrop-filter: blur(10px) saturate(120%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }

        .control-row {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        input[type="range"] {
            width: 65%;
            cursor: pointer;
        }

        .file-upload {
            background: rgba(255,255,255,0.04);
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
            border: 1px solid rgba(127,255,0,0.08);
        }

        /* Buttons and active controls glow */
        button, #downloadBtn, #fitBtn {
            box-shadow: 0 0 0 rgba(127,255,0,0);
            transition: box-shadow 0.2s ease, transform 0.12s ease;
        }
        button:hover, #downloadBtn:hover, #fitBtn:hover {
            box-shadow: 0 0 15px var(--neon-glow);
            transform: translateY(-1px);
        }

    </style>
</head>
<body>

    <div class="spotlight top-left" aria-hidden="true"></div>
    <div class="spotlight top-right" aria-hidden="true"></div>
    <div class="perforation perforation-left" aria-hidden="true"></div>
    <div class="perforation perforation-right" aria-hidden="true"></div>

    <!-- Corner decorative soundwave SVGs -->
    <svg class="soundwave top-left" viewBox="0 0 200 200" aria-hidden="true">
        <path d="M0,100 C30,40 70,160 100,100 C130,40 170,160 200,100 L200 0 L0 0 Z" />
    </svg>
    <svg class="soundwave bottom-right" viewBox="0 0 200 200" aria-hidden="true">
        <path d="M0,100 C30,40 70,160 100,100 C130,40 170,160 200,100 L200 0 L0 0 Z" />
    </svg>

    <div class="main-card">

    <div class="status-header">
        <h1>Your spot is secured!</h1>
        <div class="queue-number" id="queuePos">#1,402</div>
        <div class="progress-tracker" aria-hidden="false">
            <div class="progress-label"><span class="label-icon">🚪</span><span>Entrance</span></div>
            <div class="progress-bar-wrap" id="progressWrap">
                <div class="progress-fill" id="progressFill"></div>
                <div class="progress-icon" id="progressIcon">🎫</div>
            </div>
            <div class="progress-label stage-label"><span>Stage</span><span class="label-icon">🎭</span></div>
            <div class="progress-percent" id="progressText">0% to the Stage</div>
        </div>
        <p>While you wait, design your own <strong>exclusive</strong> digital pass.</p>
    </div>

    <div class="ticket-container" id="ticketWidget">
        <img id="idol-preview" src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&w=500&q=80" alt="Preview">
        
        <div class="ticket-overlay">
            <div class="ticket-main" style="flex:1;">
                <h2 class="event-title" id="eventTitle">WORLD TOUR 2026</h2>
                <div class="user-tag" id="passTag">VIP EARLY BIRD</div>
            </div>
            <div class="ticket-side" id="ticketSide" style="width:180px; text-align:right;">
                <div id="eventWhen" style="font-size:0.95rem; opacity:0.95;">Sat, Jan 10 · 7:00 PM</div>
                <div id="eventWhere" style="font-size:0.85rem; opacity:0.8; margin-top:8px;">Seoul Arena</div>
                <div style="font-size:0.8rem; opacity:0.7; margin-top:10px;"><span style="font-family: monospace;">UUID: 882-991-KPOP</span></div>
            </div>
        </div>
    </div>

    <div class="editor-panel">
        <label>Background Image</label>
        <input type="file" id="imageLoader" class="file-upload" accept="image/*">

        <!-- Frame upload removed -->

        <div class="control-row">
            <label>Event Title</label>
            <input type="text" id="titleInput" placeholder="Event name" style="flex:1; margin-left:10px;">
        </div>

        <div class="control-row">
            <label>When</label>
            <input type="datetime-local" id="whenInput" style="flex:1; margin-left:10px;">
        </div>

        <div class="control-row">
            <label>Where</label>
            <input type="text" id="whereInput" placeholder="Venue" style="flex:1; margin-left:10px;">
        </div>

        <div class="control-row">
            <label>Info Position</label>
            <select id="infoPos" style="flex:1; margin-left:10px;">
                <option value="right">Right</option>
                <option value="left">Left</option>
            </select>
        </div>

        <div class="control-row">
            <label>Template</label>
            <select id="templateSelect" style="flex:1; margin-left:10px;">
                <option value="template-1">Classic</option>
                <option value="template-2">Modern</option>
                <option value="template-3">Perforated</option>
            </select>
        </div>

        <div class="control-row">
            <label>Accent Color</label>
            <input type="color" id="accentColor" value="#00cec9" style="margin-left:10px;">
        </div>

        <div class="control-row">
            <label>Zoom</label>
            <input type="range" id="zoomScale" min="0.2" max="4" step="0.01" value="1" style="flex:1; margin-left:10px;">
        </div>

        <div class="control-row">
            <label>Vertical</label>
            <input type="range" id="vPos" min="-80" max="80" step="1" value="0" style="flex:1; margin-left:10px;">
        </div>

        <div class="control-row">
            <label>Horizontal</label>
            <input type="range" id="hPos" min="-120" max="120" step="1" value="0" style="flex:1; margin-left:10px;">
        </div>

        <div class="control-row">
            <label></label>
            <button id="fitBtn" style="flex:1; margin-left:10px; padding:8px; border-radius:6px; border:none; cursor:pointer;">Fit to Frame</button>
        </div>

        <button id="downloadBtn" style="width:100%; padding:12px; border:none; border-radius:5px; background:var(--accent-color); color:#000; font-weight:bold; cursor:pointer;">
            Download Digital Pass
        </button>
    </div>

    </div> <!-- end main-card -->

    <script>
        // Elements
        const imageLoader = document.getElementById('imageLoader');
        const preview = document.getElementById('idol-preview');
        const zoomScale = document.getElementById('zoomScale');
        const vPos = document.getElementById('vPos');
        const titleInput = document.getElementById('titleInput');
        const whenInput = document.getElementById('whenInput');
        const whereInput = document.getElementById('whereInput');
        const infoPos = document.getElementById('infoPos');
        const templateSelect = document.getElementById('templateSelect');
        const accentColor = document.getElementById('accentColor');
        const eventTitle = document.getElementById('eventTitle');
        const eventWhen = document.getElementById('eventWhen');
        const eventWhere = document.getElementById('eventWhere');
        const ticketWidget = document.getElementById('ticketWidget');
        const ticketOverlay = document.querySelector('.ticket-overlay');
        const downloadBtn = document.getElementById('downloadBtn');
        // Progress tracker elements
        const progressFill = document.getElementById('progressFill');
        const progressIcon = document.getElementById('progressIcon');
        const progressText = document.getElementById('progressText');

        // Queue logic: initialQueue is randomized per page load for realism
        // Change minQueue/maxQueue to control the random range (inclusive)
        const minQueue = 1000;
        const maxQueue = 1600;
        const initialQueue = Math.floor(Math.random() * (maxQueue - minQueue + 1)) + minQueue;
        // Simulation interval in milliseconds — lower = faster
        const queueInterval = 1200; // adjust this value to make the fake queue move faster/slower

        // Handle Background Image Upload
        imageLoader.addEventListener('change', function(e) {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                preview.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // (frame upload removed)

        // Update Position & Scale (with horizontal pan)
        const hPos = document.getElementById('hPos');
        function updateTransform() {
            preview.style.transform = `translate(calc(-50% + ${hPos.value}px), calc(-50% + ${vPos.value}px)) scale(${zoomScale.value})`;
        }
        zoomScale.addEventListener('input', updateTransform);
        vPos.addEventListener('input', updateTransform);
        hPos.addEventListener('input', updateTransform);

        // Title/When/Where bindings
        titleInput.addEventListener('input', () => { eventTitle.textContent = titleInput.value || 'WORLD TOUR 2026'; });
        whereInput.addEventListener('input', () => { eventWhere.textContent = whereInput.value || 'Seoul Arena'; });
        whenInput.addEventListener('input', () => {
            if (!whenInput.value) return eventWhen.textContent = 'Sat, Jan 10 · 7:00 PM';
            const d = new Date(whenInput.value);
            if (isNaN(d)) return;
            eventWhen.textContent = d.toLocaleString(undefined, { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
        });

        // Info position (left / right)
        infoPos.addEventListener('change', () => {
            ticketOverlay.style.flexDirection = infoPos.value === 'left' ? 'row-reverse' : 'row';
            document.getElementById('ticketSide').style.textAlign = infoPos.value === 'left' ? 'left' : 'right';
        });

        // Template selector
        templateSelect.addEventListener('change', () => {
            ticketWidget.classList.remove('template-1','template-2','template-3');
            ticketWidget.classList.add(templateSelect.value);
        });

        // Accent color
        accentColor.addEventListener('input', () => {
            document.documentElement.style.setProperty('--accent-color', accentColor.value);
            document.querySelectorAll('.user-tag').forEach(el => el.style.background = accentColor.value);
            downloadBtn.style.background = accentColor.value;
        });

        // Initial apply of accent color
        document.documentElement.style.setProperty('--accent-color', accentColor.value);

        // Download: render the ticket widget as PNG via SVG foreignObject
        downloadBtn.addEventListener('click', async () => {
            const node = ticketWidget;
            const rect = node.getBoundingClientRect();
            // Serialize node
            const cloned = node.cloneNode(true);
            // Inline computed styles for fonts/backgrounds to improve rendering
            const serializer = new XMLSerializer();
            const wrapper = document.createElement('div');
            wrapper.appendChild(cloned);
            const serialized = serializer.serializeToString(wrapper);

            const svg = `<?xml version="1.0" encoding="utf-8"?>\n<svg xmlns='http://www.w3.org/2000/svg' width='${rect.width}' height='${rect.height}'>` +
                `<foreignObject width='100%' height='100%'>${serialized}</foreignObject></svg>`;

            const blob = new Blob([svg], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = rect.width * 2;
                canvas.height = rect.height * 2;
                const ctx = canvas.getContext('2d');
                // fill background
                ctx.fillStyle = getComputedStyle(document.body).backgroundColor || '#111';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                URL.revokeObjectURL(url);
                const link = document.createElement('a');
                link.download = 'ticket.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
            img.onerror = function(){ URL.revokeObjectURL(url); alert('Failed to render image for download in this browser.'); };
            img.src = url;
        });

        /**
         * updateQueueUI(currentQueue)
         * - currentQueue: integer current queue position
         * Calculates percentage progress from left (Entrance) -> right (Stage)
         * Formula: ((initialQueue - currentQueue) / initialQueue) * 100
         */
        function updateQueueUI(currentQueue) {
            const pct = Math.max(0, Math.min(100, ((initialQueue - currentQueue) / initialQueue) * 100));
            const pctRounded = Math.round(pct);
            progressFill.style.width = pct + '%';
            // Move icon along the bar using percentage of bar width
            progressIcon.style.left = `calc(${pct}% )`;
            progressText.textContent = `${pctRounded}% to the Stage`;
        }

        // Initial render: update displayed queue number and tracker from randomized initialQueue
        document.getElementById('queuePos').innerText = '#' + initialQueue.toLocaleString();
        updateQueueUI(initialQueue);

        // Fit to frame: scale image to cover ticket area
        const fitBtn = document.getElementById('fitBtn');
        fitBtn.addEventListener('click', () => {
            const node = ticketWidget;
            const rect = node.getBoundingClientRect();
            const iw = preview.naturalWidth || preview.width;
            const ih = preview.naturalHeight || preview.height;
            if (!iw || !ih) return alert('Please upload an image first.');
            const scale = Math.max(rect.width / iw, rect.height / ih);
            // clamp to input range
            const min = parseFloat(zoomScale.min) || 0.2;
            const max = parseFloat(zoomScale.max) || 4;
            const clamped = Math.max(min, Math.min(max, scale));
            zoomScale.value = clamped;
            vPos.value = 0;
            hPos.value = 0;
            updateTransform();
        });

        // Simulation: Countdown Queue
        let currentPos = initialQueue;
        setInterval(() => {
            if (currentPos > 1) {
                currentPos--;
                document.getElementById('queuePos').innerText = '#' + currentPos.toLocaleString();
                // update the mini progress tracker
                updateQueueUI(currentPos);
            }
        }, queueInterval);
    </script>
</body>
</html>
